name: Scheduled Verify

on:
  push:
    branches: [main]
  schedule:
    - cron: '40 */8 * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify coin-flip-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare clean environment
        run: mkdir -p /tmp/coin-flip-sdk-check

      - name: Initialize project
        working-directory: /tmp/coin-flip-sdk-check
        run: npm init -y

      - name: Install coin-flip-sdk from registry
        working-directory: /tmp/coin-flip-sdk-check
        run: npm install coin-flip-sdk

      - name: Verify module loads
        working-directory: /tmp/coin-flip-sdk-check
        run: node -e "const sdk = require('coin-flip-sdk'); console.log('coin-flip-sdk OK, exports:', Object.keys(sdk));"

      - name: Show dependency tree
        working-directory: /tmp/coin-flip-sdk-check
        run: npm ls --all
