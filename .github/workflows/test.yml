name: Automated Tests

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  run-tests:
    name: Node ${{ matrix.node-version }} tests
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
        continue-on-error: true

      - name: Install project dependencies
        run: npm install
        continue-on-error: true

      - name: Add coin-flip-sdk
        run: npm install coin-flip-sdk --no-save
        continue-on-error: true

      - name: Check SDK loads
        run: node -e "require('coin-flip-sdk'); console.log('coin-flip-sdk verified on ${{ matrix.node-version }}');"
        continue-on-error: true
